<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travesía Cósmica | J. Azeem Amezcua</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        body {
            background: linear-gradient(135deg, #8e0c25 0%, #4a0612 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        
        .temp-title {
            font-family: 'Nomad', serif;
            font-size: 4rem;
            color: #ffbf00;
            text-shadow: 4px 4px 0 #000000;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .subtitle {
            font-family: 'Noche', serif;
            font-size: 1.8rem;
            color: #faf2b0;
            font-style: italic;
            margin-bottom: 40px;
        }
        
        .temp-message {
            font-family: 'Noche', serif;
            font-size: 1.3rem;
            color: #faf2b0;
            max-width: 600px;
            text-align: center;
            line-height: 1.8;
            margin-bottom: 40px;
        }
        
        .lovecraft-icon {
            font-size: 6rem;
            margin: 30px 0;
            filter: drop-shadow(0 0 20px rgba(255, 191, 0, 0.5));
        }
        
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 40px;
            background-color: #ffbf00;
            border: 3px solid #000000;
            border-radius: 10px;
            color: #8e0c25;
            font-family: 'Nomad', serif;
            font-size: 1.2rem;
            text-decoration: none;
            transition: all 0.4s ease;
            font-weight: bold;
        }
        
        .back-button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 12px 40px rgba(255, 191, 0, 0.6);
        }
    </style>
</head>
<body>
    <div class="lovecraft-icon">🐙</div>
    
    <h1 class="temp-title">Travesía Cósmica</h1>
    
    <p class="subtitle">Mi peregrinaje lovecraftiano</p>
    
    <p class="temp-message">
        Esta página será maquetada posteriormente con la línea de tiempo de lecturas, 
        el mapamundi lovecraftiano, el bestiario personal, análisis de influencias y más.
        <br><br>
        <em>"That is not dead which can eternal lie..."</em>
    </p>
    
    <a href="../index.html" class="back-button">
        ← Regresar al Mundo de los Vivos
    </a>
</body>
</html>
